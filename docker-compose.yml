version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: vc_intelligence
      POSTGRES_USER: vcuser
      POSTGRES_PASSWORD: vcpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcuser -d vc_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15
    environment:
      NEO4J_AUTH: neo4j/vcpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - ./src/database/cypher:/import
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p vcpassword 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      POSTGRES_URL: postgresql://vcuser:vcpass@postgres:5432/vc_intelligence
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: vcpassword
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GRANOLA_API_KEY: ${GRANOLA_API_KEY}
      AFFINITY_API_KEY: ${AFFINITY_API_KEY}
      GMAIL_CREDENTIALS: ${GMAIL_CREDENTIALS}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  neo4j_data:

